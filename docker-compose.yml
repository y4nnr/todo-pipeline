services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      VIKUNJA_DB_USER: ${VIKUNJA_DB_USER}
      VIKUNJA_DB_PASSWORD: ${VIKUNJA_DB_PASSWORD}
      VIKUNJA_DB_NAME: ${VIKUNJA_DB_NAME:-vikunja}
      INGEST_DB_USER: ${INGEST_DB_USER}
      INGEST_DB_PASSWORD: ${INGEST_DB_PASSWORD}
      INGEST_DB_NAME: ${INGEST_DB_NAME:-ingest}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  vikunja:
    image: vikunja/vikunja:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_HOST: db
      VIKUNJA_DATABASE_USER: ${VIKUNJA_DB_USER}
      VIKUNJA_DATABASE_PASSWORD: ${VIKUNJA_DB_PASSWORD}
      VIKUNJA_DATABASE_DATABASE: ${VIKUNJA_DB_NAME:-vikunja}
      VIKUNJA_SERVICE_JWTSECRET: ${VIKUNJA_JWT_SECRET}
      VIKUNJA_SERVICE_PUBLICURL: ${VIKUNJA_PUBLIC_URL:-http://localhost:3456}
      VIKUNJA_SERVICE_TIMEZONE: ${TZ:-UTC}
    volumes:
      - ./data/vikunja/files:/app/vikunja/files
    ports:
      - "127.0.0.1:3456:3456"
